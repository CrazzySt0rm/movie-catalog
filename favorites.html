<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineSearch — Избранное</title>
  <meta name="description" content="Ваши избранные фильмы на CineSearch." />
  <link rel="stylesheet" href="style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CYFRLNQNCZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CYFRLNQNCZ');
  </script>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a class="logo" href="index.html">🎬 CineSearch</a>
      <div class="search-wrap">
        <input id="searchInput" class="search-input" type="text" placeholder="Найти фильм..." autocomplete="off" />
        <button id="searchBtn" class="btn-glass">Найти</button>
      </div>
      <div class="header-actions">
        <a href="favorites.html" class="btn-glass btn-icon active-link">♥ Избранное</a>
        <button id="themeToggle" class="btn-glass btn-icon" title="Сменить тему">🌙</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="section-title" style="margin-top:32px">♥ Избранные фильмы</div>
    <div id="moviesGrid" class="movies-grid"></div>
    <div id="noResults" class="no-results hidden">Вы ещё не добавили ни одного фильма в избранное 🎭</div>
  </main>

  <footer class="footer">
    <p>Данные предоставлены <a href="https://kinopoisk.dev" target="_blank">Кинопоиск API</a></p>
    <nav class="footer-nav">
      <a href="about.html">О проекте</a>
      <a href="privacy.html">Политика конфиденциальности</a>
    </nav>
  </footer>

  <script>
    // Theme
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.textContent = saved === 'dark' ? '☀️' : '🌙';
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.add('theme-transition');
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
      setTimeout(() => document.documentElement.classList.remove('theme-transition'), 300);
    });

    // Search redirect
    document.getElementById('searchBtn').addEventListener('click', () => {
      const q = document.getElementById('searchInput').value.trim();
      if (q) window.location.href = `index.html?q=${encodeURIComponent(q)}`;
    });
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });

    // Render favorites
    const grid = document.getElementById('moviesGrid');
    const noResults = document.getElementById('noResults');
    const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

    if (favorites.length === 0) {
      noResults.classList.remove('hidden');
    } else {
      favorites.forEach(movie => {
        const card = document.createElement('a');
        card.className = 'movie-card fade-in';
        card.href = `movie.html?id=${movie.id}`;
        const name   = movie.name || movie.title || 'Без названия';
        const year   = movie.year || (movie.release_date ? movie.release_date.slice(0, 4) : '—');
        const rv     = movie.rating ?? movie.vote_average;
        const rating = rv ? Number(rv).toFixed(1) : '—';
        const posterHTML = movie.posterUrl
          ? `<img class="movie-poster" src="${movie.posterUrl}" alt="${name}" loading="lazy" />`
          : `<div class="movie-poster-placeholder">🎬</div>`;
        card.innerHTML = `
          ${posterHTML}
          <div class="movie-info">
            <div class="movie-title">${name}</div>
            <div class="movie-year">${year}</div>
            <div class="movie-rating">⭐ ${rating}</div>
          </div>`;
        grid.appendChild(card);
      });
    }
  </script>
</body>
</html>
