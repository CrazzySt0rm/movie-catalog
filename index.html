<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineSearch — Каталог фильмов</title>
  <meta name="description" content="CineSearch — бесплатный каталог фильмов с поиском, фильтрами по жанрам и подборками. Найди что посмотреть сегодня вечером." />
  <meta name="keywords" content="фильмы, каталог фильмов, поиск фильмов, кино онлайн, что посмотреть, топ фильмов, новинки кино" />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="CineSearch" />
  <meta property="og:title" content="CineSearch — Каталог фильмов" />
  <meta property="og:description" content="Миллионы фильмов — один поиск. Популярное, топ рейтинга, новинки кино." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ru_RU" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="CineSearch — Каталог фильмов" />
  <meta name="twitter:description" content="Миллионы фильмов — один поиск. Популярное, топ рейтинга, новинки кино." />
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebSite","name":"CineSearch","description":"Бесплатный каталог фильмов с поиском по жанрам, рейтингам и новинкам","inLanguage":"ru"}
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a class="logo" href="index.html">🎬 CineSearch</a>
      <div class="search-wrap">
        <input id="searchInput" class="search-input" type="text" placeholder="Найти фильм..." autocomplete="off" />
        <button id="searchBtn" class="btn-glass">Найти</button>
      </div>
      <div class="header-actions">
        <a href="favorites.html" class="btn-glass btn-icon" title="Избранное">♥ <span>Избранное</span></a>
        <button id="themeToggle" class="btn-glass btn-icon" title="Сменить тему">🌙</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="heroSection" class="hero">
      <h1>Открывай лучшее кино</h1>
      <p>Миллионы фильмов — один поиск</p>
    </section>

    <!-- Табы разделов -->
    <div id="tabsSection" class="tabs-wrap">
      <button class="tab active" data-section="popular">🔥 Популярное</button>
      <button class="tab" data-section="top_rated">⭐ Топ рейтинга</button>
      <button class="tab" data-section="now_playing">🎬 В кино сейчас</button>
      <button class="tab" data-section="upcoming">🗓 Скоро</button>
    </div>

    <!-- Фильтры по жанрам -->
    <div id="genreFilters" class="genre-filters">
      <button class="genre-btn active" data-genre="">Все жанры</button>
    </div>

    <div id="sectionTitle" class="section-title">Популярное прямо сейчас</div>

    <div id="moviesGrid" class="movies-grid"></div>

    <div id="loader" class="loader hidden">Загрузка...</div>
    <div id="noResults" class="no-results hidden">Ничего не найдено 🎭</div>

    <div id="pagination" class="pagination hidden">
      <button id="prevBtn" class="btn-glass" disabled>← Назад</button>
      <span id="pageInfo" class="page-info"></span>
      <button id="nextBtn" class="btn-glass">Вперёд →</button>
    </div>
  </main>

  <footer class="footer">
    <p>Данные предоставлены <a href="https://www.themoviedb.org" target="_blank">TMDB</a></p>
    <nav class="footer-nav">
      <a href="about.html">О проекте</a>
      <a href="privacy.html">Политика конфиденциальности</a>
    </nav>
  </footer>

  <script src="app.js"></script>
</body>
</html>
