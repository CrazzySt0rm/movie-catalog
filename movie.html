<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineSearch — Фильм</title>
  <meta name="description" content="Подробная информация о фильме: описание, рейтинг, актёры, режиссёр." />
  <link rel="stylesheet" href="style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-CYFRLNQNCZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CYFRLNQNCZ');
  </script>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a class="logo" href="index.html">🎬 CineSearch</a>
      <div class="search-wrap">
        <input id="searchInput" class="search-input" type="text" placeholder="Найти фильм..." autocomplete="off" />
        <button id="searchBtn" class="btn-glass">Найти</button>
      </div>
      <div class="header-actions">
        <a href="favorites.html" class="btn-glass btn-icon">♥ Избранное</a>
        <button id="themeToggle" class="btn-glass btn-icon" title="Сменить тему">🌙</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="loader" class="loader">Загрузка...</div>
    <div id="content" class="hidden"></div>
    <div id="error" class="no-results hidden">Фильм не найден 🎭</div>
  </main>

  <footer class="footer">
    <p>Данные предоставлены <a href="https://www.themoviedb.org" target="_blank">TMDB</a></p>
    <nav class="footer-nav">
      <a href="about.html">О проекте</a>
      <a href="privacy.html">Политика конфиденциальности</a>
    </nav>
  </footer>

  <script>
    const BASE_URL = '/api';
    const IMG_BASE = '/img/w500';
    const BACK_BASE= '/img/w1280';

    // Theme
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.add('theme-transition');
      const cur  = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
      setTimeout(() => document.documentElement.classList.remove('theme-transition'), 300);
    });

    // Search
    document.getElementById('searchBtn').addEventListener('click', () => {
      const q = document.getElementById('searchInput').value.trim();
      if (q) window.location.href = `index.html?q=${encodeURIComponent(q)}`;
    });
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });

    // Favorites helpers
    function getFavorites() { return JSON.parse(localStorage.getItem('favorites') || '[]'); }
    function saveFavorites(favs) { localStorage.setItem('favorites', JSON.stringify(favs)); }
    function isFav(id) { return getFavorites().some(f => f.id === id); }
    function toggleFav(movie) {
      let favs = getFavorites();
      if (isFav(movie.id)) {
        favs = favs.filter(f => f.id !== movie.id);
      } else {
        favs.push({ id: movie.id, title: movie.title, poster_path: movie.poster_path, release_date: movie.release_date, vote_average: movie.vote_average });
      }
      saveFavorites(favs);
    }

    // Load movie
    const params  = new URLSearchParams(window.location.search);
    const movieId = params.get('id');

    async function loadMovie() {
      if (!movieId) { showError(); return; }
      try {
        const res = await fetch(`${BASE_URL}/movie/${movieId}?language=ru-RU&append_to_response=credits`);
        if (!res.ok) throw new Error();
        renderMovie(await res.json());
      } catch { showError(); }
    }

    function renderMovie(m) {
      document.getElementById('loader').classList.add('hidden');
      const content = document.getElementById('content');

      const year     = m.release_date ? m.release_date.slice(0, 4) : '—';
      const rating   = m.vote_average ? Number(m.vote_average).toFixed(1) : '—';
      const runtime  = m.runtime ? `${m.runtime} мин` : '—';
      const genres   = (m.genres || []).map(g => `<span class="meta-tag">${g.name}</span>`).join('');
      const director = (m.credits?.crew || []).find(c => c.job === 'Director');
      const cast     = (m.credits?.cast || []).slice(0, 6).map(a => a.name).join(', ');

      const bannerHTML = m.backdrop_path
        ? `<img class="movie-banner" src="${BACK_BASE}${m.backdrop_path}" alt="${m.title}" />`
        : '';

      const posterHTML = m.poster_path
        ? `<img class="detail-poster" src="${IMG_BASE}${m.poster_path}" alt="${m.title}" />`
        : `<div class="detail-poster-placeholder">🎬</div>`;

      const favActive = isFav(m.id) ? 'active' : '';
      const favLabel  = isFav(m.id) ? '♥ В избранном' : '♡ В избранное';

      content.innerHTML = `
        <a class="back-link" href="index.html" id="backLink">← Назад</a>
        ${bannerHTML}
        <div class="detail-wrap">
          ${posterHTML}
          <div class="detail-info">
            <h1>${m.title}</h1>
            ${m.original_title !== m.title ? `<div style="color:var(--text-muted);margin-top:4px;font-size:.9rem">${m.original_title}</div>` : ''}
            <div class="detail-meta">
              <span class="meta-tag accent">⭐ ${rating}</span>
              <span class="meta-tag">${year}</span>
              <span class="meta-tag">⏱ ${runtime}</span>
              ${m.status ? `<span class="meta-tag">${m.status}</span>` : ''}
            </div>
            <div class="genres-list">${genres}</div>
            ${director ? `<p style="margin-top:16px;font-size:.9rem;color:var(--text-muted)">🎬 Режиссёр: <strong style="color:var(--text)">${director.name}</strong></p>` : ''}
            ${cast ? `<p style="margin-top:8px;font-size:.9rem;color:var(--text-muted)">🎭 В ролях: ${cast}</p>` : ''}
            ${m.overview ? `<p class="detail-overview">${m.overview}</p>` : ''}
            <button class="fav-btn ${favActive}" id="favBtn">${favLabel}</button>
          </div>
        </div>`;

      document.title = `${m.title} — CineSearch`;
      content.classList.remove('hidden');

      document.getElementById('backLink').addEventListener('click', e => {
        if (history.length > 1) { e.preventDefault(); history.back(); }
      });

      document.getElementById('favBtn').addEventListener('click', function() {
        toggleFav(m);
        this.textContent = isFav(m.id) ? '♥ В избранном' : '♡ В избранное';
        this.classList.toggle('active', isFav(m.id));
      });
    }

    function showError() {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
    }

    loadMovie();
  </script>
</body>
</html>
