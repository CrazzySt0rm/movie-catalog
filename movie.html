<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineSearch — Фильм</title>
  <meta name="description" content="Подробная информация о фильме: описание, рейтинг, актёры, режиссёр." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a class="logo" href="index.html">🎬 CineSearch</a>
      <div class="search-wrap">
        <input id="searchInput" class="search-input" type="text" placeholder="Найти фильм..." autocomplete="off" />
        <button id="searchBtn" class="btn-glass">Найти</button>
      </div>
      <div class="header-actions">
        <a href="favorites.html" class="btn-glass btn-icon">♥ <span>Избранное</span></a>
        <button id="themeToggle" class="btn-glass btn-icon" title="Сменить тему">🌙</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div id="loader" class="loader">Загрузка...</div>
    <div id="content" class="hidden"></div>
    <div id="error" class="no-results hidden">Фильм не найден 🎭</div>
  </main>

  <footer class="footer">
    <p>Данные предоставлены <a href="https://www.themoviedb.org" target="_blank">TMDB</a></p>
    <nav class="footer-nav">
      <a href="about.html">О проекте</a>
      <a href="privacy.html">Политика конфиденциальности</a>
    </nav>
  </footer>

  <script>
    const API_BASE = '/api';
    const IMG_BASE = '/img';

    // Theme
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.add('theme-transition');
      const cur  = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
      setTimeout(() => document.documentElement.classList.remove('theme-transition'), 300);
    });

    // Search
    document.getElementById('searchBtn').addEventListener('click', () => {
      const q = document.getElementById('searchInput').value.trim();
      if (q) window.location.href = `index.html?q=${encodeURIComponent(q)}`;
    });
    document.getElementById('searchInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('searchBtn').click();
    });

    // Favorites helpers
    function getFavorites() { return JSON.parse(localStorage.getItem('favorites') || '[]'); }
    function saveFavorites(favs) { localStorage.setItem('favorites', JSON.stringify(favs)); }
    function isFav(id) { return getFavorites().some(f => f.id === id); }
    function toggleFav(m) {
      let favs = getFavorites();
      if (isFav(m.id)) {
        favs = favs.filter(f => f.id !== m.id);
      } else {
        favs.push({
          id:        m.id,
          name:      m.title || m.original_title,
          posterUrl: m.poster_path ? `${IMG_BASE}/w300${m.poster_path}` : null,
          year:      m.release_date ? m.release_date.split('-')[0] : '—',
          rating:    m.vote_average,
        });
      }
      saveFavorites(favs);
    }

    // Load movie
    const params  = new URLSearchParams(window.location.search);
    const movieId = params.get('id');

    async function loadMovie() {
      if (!movieId) { showError(); return; }
      try {
        const res = await fetch(`${API_BASE}/movie/${movieId}?language=ru-RU&append_to_response=credits`);
        if (!res.ok) throw new Error();
        renderMovie(await res.json());
      } catch { showError(); }
    }

    function renderMovie(m) {
      document.getElementById('loader').classList.add('hidden');
      const content = document.getElementById('content');

      const title    = m.title || m.original_title || 'Без названия';
      const year     = m.release_date ? m.release_date.split('-')[0] : '—';
      const rating   = m.vote_average ? Number(m.vote_average).toFixed(1) : '—';
      const runtime  = m.runtime ? `${m.runtime} мин` : '—';
      const genres   = (m.genres || []).map(g => `<a class="meta-tag meta-tag-link" href="index.html?genre=${g.id}">${g.name}</a>`).join('');
      const director = (m.credits?.crew || []).find(c => c.job === 'Director');
      const cast     = (m.credits?.cast || []).slice(0, 6).map(a => a.name).join(', ');

      const bannerHTML = m.backdrop_path
        ? `<img class="movie-banner" src="${IMG_BASE}/original${m.backdrop_path}" alt="${title}" />`
        : '';

      const posterHTML = m.poster_path
        ? `<img class="detail-poster" src="${IMG_BASE}/w500${m.poster_path}" alt="${title}" />`
        : `<div class="detail-poster-placeholder">🎬</div>`;

      const favActive = isFav(m.id) ? 'active' : '';
      const favLabel  = isFav(m.id) ? '♥ В избранном' : '♡ В избранное';

      content.innerHTML = `
        <a class="back-link" href="index.html" id="backLink">← Назад</a>
        ${bannerHTML}
        <div class="detail-wrap">
          ${posterHTML}
          <div class="detail-info">
            <h1>${title}</h1>
            ${m.original_title && m.original_title !== m.title ? `<div style="color:var(--text-muted);margin-top:4px;font-size:.9rem">${m.original_title}</div>` : ''}
            <div class="detail-meta">
              <span class="meta-tag accent">⭐ ${rating}</span>
              <a class="meta-tag meta-tag-link" href="index.html?year=${year}">${year}</a>
              <span class="meta-tag">⏱ ${runtime}</span>
            </div>
            <div class="genres-list">${genres}</div>
            ${director ? `<p style="margin-top:16px;font-size:.9rem;color:var(--text-muted)">🎬 Режиссёр: <strong style="color:var(--text)">${director.name}</strong></p>` : ''}
            ${cast ? `<p style="margin-top:8px;font-size:.9rem;color:var(--text-muted)">🎭 В ролях: ${cast}</p>` : ''}
            ${m.overview ? `<p class="detail-overview">${m.overview}</p>` : ''}
            <div id="watchProviders"></div>
            <button class="fav-btn ${favActive}" id="favBtn">${favLabel}</button>
          </div>
        </div>`;

      document.title = `${title} — CineSearch`;
      content.classList.remove('hidden');

      document.getElementById('backLink').addEventListener('click', e => {
        if (history.length > 1) { e.preventDefault(); history.back(); }
      });

      document.getElementById('favBtn').addEventListener('click', function() {
        toggleFav(m);
        this.textContent = isFav(m.id) ? '♥ В избранном' : '♡ В избранное';
        this.classList.toggle('active', isFav(m.id));
      });

      loadWatchProviders(m.id);
    }

    async function loadWatchProviders(tmdbId) {
      if (!tmdbId) return;
      const PROVIDERS = {
        'ivi':        'https://www.ivi.ru',
        'Кинопоиск':  'https://hd.kinopoisk.ru',
        'Kinopoisk':  'https://hd.kinopoisk.ru',
      };
      try {
        const res = await fetch(`${API_BASE}/movie/${tmdbId}/watch/providers?language=ru-RU&region=RU`);
        if (!res.ok) return;
        const data = await res.json();
        const ru   = data.results?.RU;
        const free = [...(ru?.free || []), ...(ru?.ads || [])].filter(p => PROVIDERS[p.provider_name]);
        if (!free.length) return;

        const logos = free.map(p =>
          `<a href="${PROVIDERS[p.provider_name]}" target="_blank" rel="noopener" title="${p.provider_name}">
            <img src="${IMG_BASE}/w45${p.logo_path}" alt="${p.provider_name}" class="provider-logo" />
          </a>`
        ).join('');

        const el = document.getElementById('watchProviders');
        if (!el) return;
        el.innerHTML = `<p class="watch-free-label">▶ Смотреть бесплатно:</p><div class="providers-list">${logos}</div>`;
        el.classList.add('watch-free');
      } catch {}
    }

    function showError() {
      document.getElementById('loader').classList.add('hidden');
      document.getElementById('error').classList.remove('hidden');
    }

    loadMovie();
  </script>
</body>
</html>
